name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # H6: Minimal permissions — only read repository contents.
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: todos
          POSTGRES_PASSWORD: todos
          POSTGRES_DB: todos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U todos -d todos_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      # H6: pinned to commit SHA for actions/checkout@v6 (tag: v6)
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      # H6: pinned to commit SHA for actions/setup-python@v6 (tag: v6)
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.14"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          .venv/bin/pip install -e ".[dev]"
          .venv/bin/pip install -e "mcp/todos-backend/"

      - name: Install shell linting tools
        run: |
          sudo apt-get install -y shellcheck
          SHFMT_VER=3.13.1
          curl -sSL \
            "https://github.com/mvdan/sh/releases/download/v${SHFMT_VER}/shfmt_v${SHFMT_VER}_linux_amd64" \
            -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt

      - name: Quality gate
        env:
          ENV_PROFILE: test
        run: ./scripts/quality/checks.sh

  scan:
    runs-on: ubuntu-latest
    # M10: Scan base image for OS/library CVEs (CRITICAL and HIGH, unfixed only).
    permissions:
      contents: read
    steps:
      # H6: pinned to commit SHA for actions/checkout@v6 (tag: v6)
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      # M10: aquasecurity/trivy-action@v0.36.0 pinned to commit SHA
      # To update: check https://github.com/aquasecurity/trivy-action/releases
      - name: Scan image for CVEs
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: 'python:3.14-slim-bookworm'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

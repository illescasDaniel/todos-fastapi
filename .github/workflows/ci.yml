name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: todos
          POSTGRES_PASSWORD: todos
          POSTGRES_DB: todos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U todos -d todos_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: .venv/bin/pip install -e ".[dev]"

      - name: Audit dependencies
        run: .venv/bin/pip install pip-audit && .venv/bin/pip-audit

      - name: Ruff
        run: ./scripts/run_ruff.sh

      - name: Tests with coverage
        env:
          JWT_SECRET_KEY: test-secret-key-for-ci-suite-32bytes!
          TEST_DATABASE_URL: postgresql+asyncpg://todos:todos@127.0.0.1:5432/todos_test
        run: ./scripts/run_tests.sh --coverage

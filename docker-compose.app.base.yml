# App service — production (Path C) and local full-stack base (Path B).
# Path B: ./scripts/container/up.sh merges docker-compose.infra.yml + docker-compose.app.with-infra.yml
# Path C: ./scripts/container/deploy.sh uses this file only (external DATABASE_URL / VALKEY_URL)
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todos-app
    ports:
      - "${COMPOSE_APP_BIND:?set COMPOSE_APP_BIND in config/ports.env}:${API_PORT:?set API_PORT in config/ports.env}:8000"
    env_file:
      # NOTE: For production, prefer injecting only required vars via your orchestrator's
      # secrets manager (Kubernetes secrets, Podman secrets, etc.) rather than loading the
      # whole .env file. This file is used for local and single-host deployments only.
      - .env
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL}
      VALKEY_URL: ${COMPOSE_VALKEY_URL}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M

# Local development infra only (Valkey + PostgreSQL). Not used for production deploy.
# Path A host app: ./scripts/start.sh — Postgres on 127.0.0.1, app in .venv with hot reload.
# Path B full stack: ./scripts/container/up.sh — merges docker-compose.app.base.yml + docker-compose.app.with-infra.yml
name: todos

services:
  valkey:
    # H5: pinned to amd64 digest; re-pin with: podman manifest inspect docker.io/valkey/valkey:8-alpine
    image: docker.io/valkey/valkey:8-alpine@sha256:18c7010efe0a74c334ee01bd2c5632735d2c0d9518f85b9ad3d995314c6a0b7a
    container_name: todos-valkey
    command: ["valkey-server", "--requirepass", "${VALKEY_PASSWORD:?set VALKEY_PASSWORD in .env}"]
    user: valkey
    ports:
      - "${COMPOSE_INFRA_BIND:-127.0.0.1}:${VALKEY_PORT:-6379}:6379"
    volumes:
      - todos-valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  postgres:
    # H5: pinned to amd64 digest; re-pin with: podman manifest inspect docker.io/library/postgres:16-alpine
    image: docker.io/library/postgres:16-alpine@sha256:79950da386bda7fcc9d57aa9aa9be6c6d7407596a9b8f68014b09a778a9ab316
    container_name: todos-postgres
    ports:
      - "${COMPOSE_INFRA_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-todos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-todos}
    volumes:
      - todos-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - DAC_OVERRIDE

volumes:
  todos-postgres-data:
  todos-valkey-data:
